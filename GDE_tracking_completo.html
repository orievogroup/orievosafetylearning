<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orievo Safety Learn</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4FC3DC;
            --secondary: #2A9BB8;
            --dark: #1a1a1a;
            --accent: #6DD5ED;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo-container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo-container img {
            max-width: 300px;
            height: auto;
        }

        .logo-container h2 {
            color: var(--primary);
            margin-top: 10px;
            font-size: 24px;
        }

        /* ========================================== */
        /* ROADMAP CORPORATIVO - SELEÇÃO DE MÓDULOS */
        /* ========================================== */
        
        .mundos-roadmap {
            max-width: 900px;
            margin: 40px auto;
            position: relative;
        }
        
        .roadmap-header {
            text-align: center;
            margin-bottom: 50px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .roadmap-header h2 {
            color: #1a1a1a;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .roadmap-header p {
            color: #666;
            font-size: 16px;
        }
        
        .roadmap-progress-global {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .roadmap-progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        
        .roadmap-progress-bar {
            height: 12px;
            background: #e9ecef;
            border-radius: 6px;
            overflow: hidden;
        }
        
        .roadmap-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 6px;
            transition: width 0.8s ease;
        }
        
        /* Timeline vertical */
        .roadmap-timeline {
            position: relative;
            padding: 0 0 0 80px;
        }
        
        .roadmap-timeline::before {
            content: '';
            position: absolute;
            left: 30px;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, var(--primary) 0%, #e9ecef 100%);
        }
        
        /* Módulo individual */
        .modulo-item {
            position: relative;
            margin-bottom: 40px;
            cursor: pointer;
        }
        
        .modulo-item::before {
            content: '';
            position: absolute;
            left: -65px;
            top: 50%;
            transform: translateY(-50%);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            border: 4px solid #e9ecef;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 2;
        }
        
        /* Estados do módulo */
        .modulo-item.completed::before {
            border-color: #28a745;
            background: #28a745;
            box-shadow: 0 4px 20px rgba(40, 167, 69, 0.3);
        }
        
        .modulo-item.available::before {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 4px 20px rgba(79, 195, 220, 0.4);
            animation: pulse-module 2s infinite;
        }
        
        .modulo-item.locked::before {
            border-color: #dee2e6;
            background: #f8f9fa;
            opacity: 0.6;
        }
        
        @keyframes pulse-module {
            0%, 100% {
                transform: translateY(-50%) scale(1);
            }
            50% {
                transform: translateY(-50%) scale(1.05);
            }
        }
        
        /* Ícone no círculo da timeline */
        .modulo-timeline-icon {
            position: absolute;
            left: -50px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 28px;
            z-index: 3;
            filter: grayscale(100%);
            opacity: 0.5;
            transition: all 0.3s;
        }
        
        .modulo-item.completed .modulo-timeline-icon {
            filter: grayscale(0%);
            opacity: 1;
        }
        
        .modulo-item.available .modulo-timeline-icon {
            filter: grayscale(0%);
            opacity: 1;
            animation: icon-glow 2s infinite;
        }
        
        @keyframes icon-glow {
            0%, 100% {
                filter: drop-shadow(0 0 0px rgba(79, 195, 220, 0));
            }
            50% {
                filter: drop-shadow(0 0 8px rgba(79, 195, 220, 0.8));
            }
        }
        
        /* Card do módulo */
        .modulo-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s;
            border-left: 5px solid #dee2e6;
        }
        
        .modulo-item.completed .modulo-card {
            border-left-color: #28a745;
            background: linear-gradient(135deg, #ffffff 0%, #f0fff4 100%);
        }
        
        .modulo-item.available .modulo-card {
            border-left-color: var(--primary);
        }
        
        .modulo-item.locked .modulo-card {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .modulo-item:not(.locked):hover .modulo-card {
            transform: translateX(10px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        
        /* Cabeçalho do módulo */
        .modulo-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        
        .modulo-title-group {
            flex: 1;
        }
        
        .modulo-status-badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        
        .modulo-item.completed .modulo-status-badge {
            background: #d4edda;
            color: #155724;
        }
        
        .modulo-item.available .modulo-status-badge {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .modulo-item.locked .modulo-status-badge {
            background: #e9ecef;
            color: #6c757d;
        }
        
        .modulo-title {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .modulo-icon {
            font-size: 32px;
        }
        
        .modulo-description {
            color: #666;
            font-size: 15px;
            margin-bottom: 20px;
        }
        
        /* Métricas do módulo */
        .modulo-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .metric-item {
            text-align: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .metric-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            display: block;
            margin-bottom: 5px;
        }
        
        .modulo-item.completed .metric-value {
            color: #28a745;
        }
        
        .metric-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Barra de progresso do módulo */
        .modulo-progress {
            margin-bottom: 15px;
        }
        
        .modulo-progress-bar {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .modulo-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .modulo-item.completed .modulo-progress-fill {
            background: linear-gradient(90deg, #28a745, #20c997);
        }
        
        .modulo-progress-text {
            font-size: 13px;
            color: #666;
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
        }
        
        /* Botão de ação */
        .modulo-action {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 15px;
            border-top: 1px solid #e9ecef;
        }
        
        .modulo-cta {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .modulo-cta:hover {
            background: var(--secondary);
            transform: translateX(5px);
        }
        
        .modulo-item.completed .modulo-cta {
            background: #28a745;
        }
        
        .modulo-item.completed .modulo-cta:hover {
            background: #218838;
        }
        
        .modulo-item.locked .modulo-cta {
            background: #6c757d;
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        .modulo-item.locked .modulo-cta:hover {
            transform: none;
        }
        
        /* Ícone de cadeado */
        .lock-icon {
            font-size: 20px;
            opacity: 0.5;
        }

        .mundos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .mundo-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
        }

        .mundo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            border-color: var(--primary);
        }

        .mundo-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .mundo-card h3 {
            color: #333;
            font-size: 22px;
            margin-bottom: 10px;
        }

        .mundo-card p {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .mundo-card button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mundo-card button:hover {
            background: var(--secondary);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-content h2 {
            color: var(--primary);
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--secondary);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        .mundo-screen {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .mundo-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .mundo-header h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .mundo-header p {
            color: #666;
            font-size: 16px;
        }

        .progresso-container {
            margin-bottom: 30px;
        }

        .progresso-bar {
            background: #e0e0e0;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        .progresso-fill {
            background: linear-gradient(90deg, var(--primary), var(--accent));
            height: 100%;
            transition: width 0.5s;
        }

        .progresso-text {
            text-align: center;
            color: #666;
            margin-top: 10px;
            font-size: 14px;
        }

        /* ========================================== */
        /* JORNADA LINEAR PROFISSIONAL */
        /* ========================================== */
        
        .journey-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .journey-header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .journey-header h2 {
            color: #1a1a1a;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        /* Linha do tempo horizontal */
        .journey-timeline {
            position: relative;
            padding: 60px 0;
            overflow-x: auto;
        }
        
        .journey-line {
            position: absolute;
            top: 90px;
            left: 60px;
            right: 60px;
            height: 4px;
            background: #e9ecef;
            z-index: 1;
        }
        
        .journey-line-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.8s ease;
        }
        
        /* Fases na linha */
        .journey-phases {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            z-index: 2;
            min-width: 800px;
            padding: 0 30px;
        }
        
        /* Fase individual */
        .phase-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }
        
        .phase-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            border: 4px solid #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            position: relative;
        }
        
        .phase-node.completed .phase-circle {
            border-color: #28a745;
            background: #f0fff4;
        }
        
        .phase-node.available .phase-circle {
            border-color: var(--primary);
            background: white;
            animation: pulse-phase 2s infinite;
        }
        
        .phase-node.locked .phase-circle {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .phase-node:not(.locked):hover .phase-circle {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        @keyframes pulse-phase {
            0%, 100% {
                box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            }
            50% {
                box-shadow: 0 4px 25px rgba(79, 195, 220, 0.4);
            }
        }
        
        /* Checkmark de conclusão */
        .phase-check {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 32px;
            height: 32px;
            background: #28a745;
            border-radius: 50%;
            border: 3px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        
        /* Nome da fase */
        .phase-label {
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            max-width: 100px;
        }
        
        .phase-node.locked .phase-label {
            color: #999;
        }
        
        /* Bandeira de chegada */
        .finish-flag {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: 4px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
            animation: flag-wave 2s ease-in-out infinite;
        }
        
        @keyframes flag-wave {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        /* ========================================== */
        /* MODAL DE CERTIFICADO */
        /* ========================================== */
        
        .certificate-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .certificate-modal.active {
            display: flex;
        }
        
        .certificate-content {
            background: white;
            max-width: 900px;
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .certificate-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .certificate-header h2 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
        }
        
        .certificate-body {
            padding: 50px;
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            border: 15px solid;
            border-image: linear-gradient(135deg, var(--primary), var(--accent)) 1;
            position: relative;
        }
        
        .certificate-body::before {
            content: '🏆';
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 60px;
            opacity: 0.1;
        }
        
        .certificate-logos {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .certificate-logos img {
            max-width: 200px;
            max-height: 80px;
            object-fit: contain;
        }
        
        .certificate-title {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .certificate-text {
            text-align: center;
            font-size: 18px;
            color: #333;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        
        .certificate-name {
            font-size: 36px;
            font-weight: 700;
            color: var(--secondary);
            margin: 20px 0;
            text-transform: uppercase;
        }
        
        .certificate-module {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary);
            margin: 20px 0;
        }
        
        .certificate-modules-list {
            text-align: left;
            margin: 20px auto;
            max-width: 500px;
        }
        
        .certificate-modules-list li {
            font-size: 16px;
            margin: 10px 0;
            color: #28a745;
        }
        
        .certificate-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e9ecef;
        }
        
        .certificate-info-item {
            text-align: center;
        }
        
        .certificate-info-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        
        .certificate-info-value {
            font-size: 16px;
            font-weight: 700;
            color: #333;
        }
        
        .certificate-footer {
            padding: 20px 30px;
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .btn-certificate {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .btn-download {
            background: var(--primary);
            color: white;
        }
        
        .btn-download:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }
        
        .btn-close-cert {
            background: #6c757d;
            color: white;
        }
        
        .btn-close-cert:hover {
            background: #5a6268;
        }
        

        .fases-list {
            list-style: none;
        }

        .fase-item {
            background: #f8f9fa;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 5px solid var(--primary);
            display: flex;
            align-items: center;

        function renderizarRoadmap() {
            const roadmap = document.getElementById('mundosRoadmap');

                    let motivoBloqueio = '';

                        estado = 'completed';
                        algumMundoCompleto = true;
                    } else if (moduloIndex === 0 || algumMundoCompleto) {
                        estado = 'available';
                    } else {
                        motivoBloqueio = 'anterior';
                    }
                    
                    const modulo = document.createElement('div');
                    modulo.className = `modulo-item ${estado}`;
                    
                    // Ícone na timeline

            let fasesCompletas = 0;
            
            for (let id in MUNDOS) {
                if (MUNDOS[id].ativo !== false) {
                    totalFases += MUNDOS[id].fases.length;
                    fasesCompletas += (progresso[id] || []).length;
                }
            }
            
            const percentualGlobal = totalFases > 0 ? Math.round((fasesCompletas / totalFases) * 100) : 0;
            
            document.getElementById('progressoGlobalFill').style.width = `${percentualGlobal}%`;
            document.getElementById('progressoGlobalText').textContent = `${percentualGlobal}%`;
        }

        function renderizarJornadaLinear() {
            const mundo = MUNDOS[mundoSelecionado];
            const container = document.getElementById('journeyPhases');
            const progressBar = document.getElementById('journeyProgress');
            
            container.innerHTML = '';
            
            const icones = {
                'video': '📹',
                'artigo': '📄',
                'quiz': '❓',
                'memoria': '🎮',
                'associar': '🔗'
            };
            
            // Renderizar fases
            mundo.fases.forEach((fase, index) => {
                const isCompleted = progresso[mundoSelecionado].includes(index);
                const isAvailable = index === 0 || progresso[mundoSelecionado].includes(index - 1);
                const isLocked = !isAvailable && !isCompleted;
                
                const phaseNode = document.createElement('div');
                phaseNode.className = 'phase-node';
                
                if (isCompleted) {
                    phaseNode.classList.add('completed');
                } else if (isAvailable) {
                    phaseNode.classList.add('available');
                } else {
                    phaseNode.classList.add('locked');
                }
                
                // Círculo da fase
                const circle = document.createElement('div');
                circle.className = 'phase-circle';
                circle.textContent = icones[fase.tipo] || '❓';
                
                // Checkmark se completa
                if (isCompleted) {
                    const check = document.createElement('div');
                    check.className = 'phase-check';
                    check.textContent = '✓';
                    circle.appendChild(check);
                }
                
                phaseNode.appendChild(circle);
                
                // Label da fase
                const label = document.createElement('div');
                label.className = 'phase-label';
                label.textContent = fase.nome.replace(/^(Vídeo|Artigo|Quiz|Jogo):\s*/, '');
                phaseNode.appendChild(label);
                
                // Click handler
                if (!isLocked) {
                    phaseNode.onclick = () => abrirFase(index);
                }
                
                container.appendChild(phaseNode);
            });
            
            // Bandeira de chegada
            const finishNode = document.createElement('div');
            finishNode.className = 'phase-node';
            
            const finishCircle = document.createElement('div');
            finishCircle.className = 'finish-flag';
            finishCircle.textContent = '🏁';
            finishNode.appendChild(finishCircle);
            
            const finishLabel = document.createElement('div');
            finishLabel.className = 'phase-label';
            finishLabel.textContent = 'Finalizar';
            finishNode.appendChild(finishLabel);
            
            container.appendChild(finishNode);
            
            // Atualizar progresso da linha
            const totalFases = mundo.fases.length;
            const concluidas = progresso[mundoSelecionado].length;
            const percentual = totalFases > 0 ? (concluidas / totalFases) * 100 : 0;
            progressBar.style.width = `${percentual}%`;
            
            // Se todas concluídas, mostrar certificado do módulo
            if (concluidas === totalFases) {
                finishNode.onclick = () => mostrarCertificadoModulo();
            }
        }

        function carregarMemoria(fase, conteudo) {
            const simbolos = [...fase.simbolos, ...fase.simbolos];
            simbolos.sort(() => Math.random() - 0.5);
            
            memoriaCards = simbolos.map((simbolo, i) => ({
                id: i,
                simbolo,
                flipped: false,
                matched: false
            }));
            memoriaFlipped = [];
            
            let html = `<h2>${fase.nome}</h2>`;
            html += '<div class="score">Pares encontrados: <span id="pares">0</span>/8</div>';
            html += '<div class="memory-grid">';
            
            memoriaCards.forEach((card, i) => {
                html += `<div class="memory-card" id="card-${i}" onclick="flipCard(${i})">?</div>`;
            });
            
            html += '</div>';
            conteudo.innerHTML = html;
        }

        function flipCard(index) {
            if (memoriaFlipped.length === 2) return;
            if (memoriaCards[index].matched) return;
            if (memoriaFlipped.includes(index)) return;
            
            const card = document.getElementById(`card-${index}`);
            card.textContent = memoriaCards[index].simbolo;
            card.classList.add('flipped');
            memoriaFlipped.push(index);
            
            if (memoriaFlipped.length === 2) {
                setTimeout(checkMatch, 800);
            }
        }

        function checkMatch() {
            const [i1, i2] = memoriaFlipped;
            const card1 = memoriaCards[i1];
            const card2 = memoriaCards[i2];
            
            if (card1.simbolo === card2.simbolo) {
                card1.matched = true;
                card2.matched = true;
                document.getElementById(`card-${i1}`).classList.add('matched');
                document.getElementById(`card-${i2}`).classList.add('matched');
                
                const pares = memoriaCards.filter(c => c.matched).length / 2;
                document.getElementById('pares').textContent = pares;
                
                if (pares === 8) {
                    setTimeout(() => {
                        alert('Parabéns! Você completou o jogo!');
                        concluirFase();
                    }, 500);
                }
            } else {
                document.getElementById(`card-${i1}`).textContent = '?';
                document.getElementById(`card-${i2}`).textContent = '?';
                document.getElementById(`card-${i1}`).classList.remove('flipped');
                document.getElementById(`card-${i2}`).classList.remove('flipped');
            }
            
            memoriaFlipped = [];
        }

        let associarPares = [];
        let associarSelecionado = null;
        let associarAcertos = 0;
        
        function carregarAssociar(fase, conteudo) {
            // Embaralha definições
            const definicoes = [...fase.pares.map((p, i) => ({texto: p.definicao, index: i}))];
            definicoes.sort(() => Math.random() - 0.5);
            
            associarPares = fase.pares.map((p, i) => ({...p, conectado: false, index: i}));
            associarSelecionado = null;
            associarAcertos = 0;
            
            let html = `<h2>${fase.nome}</h2>`;
            html += `<div class="score">Pares conectados: <span id="paresAssociados">0</span>/${fase.pares.length}</div>`;
            html += `<p style="text-align: center; color: #666; margin: 20px 0;">Clique em um termo à esquerda, depois em sua definição à direita</p>`;
            
            html += '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin: 30px 0;">';
            
            // Coluna esquerda - Termos
            html += '<div style="display: flex; flex-direction: column; gap: 15px;">';
            fase.pares.forEach((par, i) => {
                html += `
                    <div id="termo-${i}" class="associar-termo" onclick="selecionarTermo(${i})" 
                         style="background: #3498db; color: white; padding: 20px; border-radius: 10px; 
                                cursor: pointer; text-align: center; font-weight: 600; transition: all 0.3s;
                                border: 3px solid transparent;">
                        ${par.termo}
                    </div>
                `;
            });
            html += '</div>';
            
            // Coluna direita - Definições (embaralhadas)
            html += '<div style="display: flex; flex-direction: column; gap: 15px;">';
            definicoes.forEach((def, i) => {
                html += `
                    <div id="def-${def.index}" class="associar-def" onclick="selecionarDefinicao(${def.index})"
                         style="background: #e0e0e0; color: #333; padding: 20px; border-radius: 10px; 
                                cursor: pointer; text-align: center; transition: all 0.3s;
                                border: 3px solid transparent;">
                        ${def.texto}
                    </div>
                `;
            });
            html += '</div>';
            
            html += '</div>';
            
            conteudo.innerHTML = html;
        }
        
        function selecionarTermo(index) {
            if (associarPares[index].conectado) return;
            
            // Remove seleção anterior
            document.querySelectorAll('.associar-termo').forEach(el => {
                if (!associarPares[parseInt(el.id.split('-')[1])].conectado) {
                    el.style.background = '#3498db';
                    el.style.borderColor = 'transparent';
                    el.style.transform = 'scale(1)';
                }
            });
            
            // Seleciona novo
            const termo = document.getElementById(`termo-${index}`);
            termo.style.background = '#2ecc71';
            termo.style.borderColor = '#27ae60';
            termo.style.transform = 'scale(1.05)';
            
            associarSelecionado = index;
        }
        
        function selecionarDefinicao(index) {
            if (associarSelecionado === null) {
                alert('Selecione um termo à esquerda primeiro!');
                return;
            }
            
            if (associarPares[index].conectado) return;
            
            const termo = document.getElementById(`termo-${associarSelecionado}`);
            const def = document.getElementById(`def-${index}`);
            
            // Verifica se está correto
            if (associarSelecionado === index) {
                // CORRETO!
                termo.style.background = '#27ae60';
                termo.style.borderColor = '#229954';
                termo.style.cursor = 'default';
                termo.style.transform = 'scale(1)';
                
                def.style.background = '#27ae60';
                def.style.borderColor = '#229954';
                def.style.color = 'white';
                def.style.cursor = 'default';
                
                associarPares[index].conectado = true;
                associarAcertos++;
                
                document.getElementById('paresAssociados').textContent = associarAcertos;
                
                associarSelecionado = null;
                
                // Verifica se completou
                if (associarAcertos === associarPares.length) {
                    setTimeout(() => {
                        alert('Parabéns! Você conectou todos os pares corretamente!');
                        concluirFase();
                    }, 500);
                }
            } else {
                // ERRADO!
                termo.style.background = '#e74c3c';
                def.style.background = '#e74c3c';
                def.style.color = 'white';
                
                setTimeout(() => {
                    termo.style.background = '#3498db';
                    termo.style.borderColor = 'transparent';
                    termo.style.transform = 'scale(1)';
                    def.style.background = '#e0e0e0';
                    def.style.color = '#333';
                    associarSelecionado = null;
                }, 800);
            }
        }

        function concluirFase() {
            if (!progresso[mundoSelecionado].includes(faseAtual)) {
                progresso[mundoSelecionado].push(faseAtual);
                
                // ENVIA TRACKING DA FASE
                const fase = MUNDOS[mundoSelecionado].fases[faseAtual];
                if (fase.tipo !== 'quiz') { // Quiz já envia tracking próprio
                    enviarTracking(
                        MUNDOS[mundoSelecionado].nome,
                        fase.nome,
                        'Concluído'
                    );
                }
            }
            voltarMundo();
        }

        function voltarMundo() {
            document.getElementById('telaFase').classList.add('hidden');
            document.getElementById('telaMundo').classList.remove('hidden');
            abrirMundo();
        }

        function voltarSelecao() {
            document.getElementById('telaMundo').classList.add('hidden');
            document.getElementById('telaSelecao').classList.remove('hidden');
            mundoSelecionado = null;
            renderizarRoadmap();
            calcularProgressoGlobal();
        }
    </script>
